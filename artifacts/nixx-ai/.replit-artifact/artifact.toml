kind = "web"
previewPath = "/"
title = "Nixx AI"
version = "1.0.0"
id = "artifacts/nixx-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18605

[services.development]
run = "pnpm --filter @workspace/nixx-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nixx-ai", "run", "build" ]
publicDir = "artifacts/nixx-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18605"
BASE_PATH = "/"
