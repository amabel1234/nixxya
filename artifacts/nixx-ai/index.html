    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Loading skeleton -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#0b0a1a;color:#f8f8f8;font-family:'Inter',sans-serif}
      #root:empty::after{
        content:'';display:block;width:48px;height:48px;border-radius:50%;
        border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;
        animation:spin .7s linear infinite;
        position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      }
      @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    </style>
    <style>
      vercel-live-feedback,#__vercel_toolbar_injection__,
      .__vercel-toolbar,vercel-toolbar,
      [data-vercel-toolbar]{display:none!important;visibility:hidden!important}
    </style>
    <script>
      (function(){
        function rm(){
          ['vercel-live-feedback','__vercel_toolbar_injection__'].forEach(function(sel){
            var el=document.getElementById(sel)||document.querySelector(sel);
            if(el)el.remove();
          });
          document.querySelectorAll('[data-vercel-toolbar],.__vercel-toolbar,vercel-toolbar').forEach(function(el){el.remove();});
        }
        rm();
        new MutationObserver(rm).observe(document.documentElement,{childList:true,subtree:true});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
