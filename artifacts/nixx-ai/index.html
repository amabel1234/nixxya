<!DOCTYPE html>
  <html lang="id" data-theme="dark">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

      <link rel="manifest" href="/manifest.json" />
      <meta name="theme-color" content="#0b0a1a" />
      <style>
        *,*::before,*::after{box-sizing:border-box}
        html,body{
          margin:0;padding:0;background:#0b0a1a;color:#f8f8f8;
          /* System font — tidak perlu download, langsung render */
          font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
        }
        #root:empty::after{
          content:'';display:block;width:40px;height:40px;border-radius:50%;
          border:3px solid rgba(168,85,247,0.2);border-top-color:#a855f7;
          animation:spin .7s linear infinite;
          position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
        }
        @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
      </style>
    </head>
    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      <script>
        // Register Service Worker untuk cache assets
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        }
      </script>
    </body>
  </html>
